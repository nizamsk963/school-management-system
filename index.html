<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-feature-settings: "cv08" 1; }
    .sidebar-scroll { max-height: calc(100vh - 5.5rem); overflow-y: auto; }
    .notification-panel { max-height: calc(100vh - 5.5rem); overflow-y: auto; }
    .notification-item { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .drop-area { border-style: dashed; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <div class="flex flex-col min-h-screen">
    <header class="flex items-center justify-between gap-4 px-6 py-4 bg-white border-b border-slate-200 sticky top-0 z-40">
      <div>
        <div class="text-xl font-semibold text-slate-900">School Management Engine</div>
        <div class="text-sm text-slate-500">Functional Role SPA with dynamic workspace rendering</div>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <label class="text-sm text-slate-600">Switch Role:</label>
        <select id="roleSwitcher" class="px-3 py-2 rounded-lg border border-slate-300 bg-white text-slate-800 shadow-sm"></select>
        <div class="relative">
          <button id="notificationToggle" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800 transition">
            <span>Notifications</span>
            <span id="notificationBadge" class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-rose-500 text-xs font-semibold">0</span>
          </button>
        </div>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <aside class="w-72 border-r border-slate-200 bg-slate-950 text-slate-100 sidebar-scroll px-4 py-5">
        <div class="mb-6">
          <div class="text-sm uppercase tracking-[0.2em] text-slate-400">Role Menu</div>
          <div id="currentRoleLabel" class="mt-3 text-xl font-semibold"></div>
        </div>
        <div id="sidebarMenu" class="space-y-3"></div>
      </aside>

      <main id="workspace" class="flex-1 overflow-y-auto p-6"></main>

      <aside class="w-96 border-l border-slate-200 bg-slate-50 px-5 py-5 notification-panel">
        <div class="flex items-center justify-between mb-4">
          <div>
            <div class="text-sm uppercase tracking-[0.2em] text-slate-500">Real-Time Notification Panel</div>
            <div class="mt-1 text-xs text-slate-400">Live updates stream for all role actions.</div>
          </div>
          <button id="clearNotifications" class="text-sm text-slate-700 hover:text-slate-900">Clear</button>
        </div>
        <div id="notificationList" class="space-y-3"></div>
      </aside>
    </div>
  </div>

    function init() {
      renderRoleSwitcher();
      renderSidebar();
      setRole(state.currentRole);
      renderNotificationPanel();
      document.getElementById('clearNotifications').addEventListener('click', () => {
        state.notifications = [];
        renderNotificationPanel();
      });
    }

    function renderRoleSwitcher() {
      const select = document.getElementById('roleSwitcher');
      select.innerHTML = state.roles.map(role => `<option value="${role}">${role}</option>`).join('');
      select.value = state.currentRole;
      select.addEventListener('change', (event) => setRole(event.target.value));
    }

    function setRole(role) {
      state.currentRole = role;
      document.getElementById('currentRoleLabel').textContent = role;
      document.getElementById('roleSwitcher').value = role;
      renderSidebar();
      const firstOption = roleOptions[role]?.[0]?.action;
      if (firstOption && typeof window[firstOption] === 'function') {
        window[firstOption]();
      } else {
        renderWorkspaceBanner(`${role} workspace ready. Select an option from the sidebar.`);
      }
      updateNotificationBadge();
    }

    function renderSidebar() {
      const sidebar = document.getElementById('sidebarMenu');
      const options = roleOptions[state.currentRole] || [];
      sidebar.innerHTML = options.map(option => `
        <button data-action="${option.action}" class="w-full text-left rounded-2xl px-4 py-3 bg-slate-900/90 hover:bg-slate-800 transition shadow-inner">
          ${option.label}
        </button>
      `).join('');
      sidebar.querySelectorAll('button').forEach(button => {
        button.addEventListener('click', () => {
          const action = button.dataset.action;
          if (action && typeof window[action] === 'function') {
            window[action]();
          }
        });
      });
    }

    function clearWorkspace() {
      document.getElementById('workspace').innerHTML = '';
    }

    function renderWorkspaceBanner(text) {
      clearWorkspace();
      const workspace = document.getElementById('workspace');
      workspace.innerHTML = `
        <div class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
          <div class="text-slate-900 text-2xl font-semibold mb-2">${text}</div>
          <div class="text-slate-500">Use the sidebar to navigate between functional modules for the selected role.</div>
        </div>
      `;
    }

    function renderNotificationPanel() {
      const list = document.getElementById('notificationList');
      if (state.notifications.length === 0) {
        list.innerHTML = '<div class="rounded-3xl border border-dashed border-slate-300 bg-white p-6 text-slate-500 text-center">No notifications yet.</div>';
      } else {
        list.innerHTML = state.notifications.map(item => `
          <div class="notification-item rounded-3xl bg-white p-4 shadow-sm border border-slate-200">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="font-semibold text-slate-900">${item.message}</div>
                <div class="mt-2 text-xs text-slate-500">Channels: ${item.channels.join(', ')}</div>
              </div>
              <div class="text-xs text-slate-400">${item.time}</div>
            </div>
          </div>
        `).join('');
      }
      updateNotificationBadge();
    }

    function updateNotificationBadge() {
      const badge = document.getElementById('notificationBadge');
      badge.textContent = state.notifications.length;
    }

    function addNotification(message, channels = []) {
      const event = { id: Date.now(), message, channels, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
      state.notifications.unshift(event);
      if (state.notifications.length > 50) state.notifications.pop();
      renderNotificationPanel();
    }

    function renderCreateSchools() {
      clearWorkspace();
      const workspace = document.getElementById('workspace');
      workspace.innerHTML = `

          <div class="rounded-3xl bg-white p-8 shadow-sm border border-slate-200">
            <div class="text-2xl font-semibold text-slate-900 mb-2">Create New School</div>
            <div class="text-slate-500">Register a new school with a license key and location details.</div>
          </div>
          <form id="createSchoolForm" class="grid gap-5 rounded-3xl bg-white p-8 shadow-sm border border-slate-200 md:grid-cols-2">
            <label class="space-y-2">
              <span class="text-sm font-medium text-slate-700">School Name</span>
              <input type="text" id="schoolName" required class="w-full rounded-2xl border border-slate-300 px-4 py-3 focus:border-slate-900 focus:outline-none" placeholder="Sunrise Academy" />
            </label>
            <label class="space-y-2">
              <span class="text-sm font-medium text-slate-700">Location</span>
              <input type="text" id="schoolLocation" required class="w-full rounded-2xl border border-slate-300 px-4 py-3 focus:border-slate-900 focus:outline-none" placeholder="Downtown, Mumbai" />

            <label class="space-y-2">

              <select id="schoolBoard" class="w-full rounded-2xl border border-slate-300 px-4 py-3 focus:border-slate-900 focus:outline-none">
                <option>CBSE</option>
                <option>ICSE</option>
                <option>State Board</option>
                <option>IB</option>
              </select>
            </label>
            <label class="space-y-2">
              <span class="text-sm font-medium text-slate-700">License Key</span>
              <input type="text" id="schoolLicense" required class="w-full rounded-2xl border border-slate-300 px-4 py-3 focus:border-slate-900 focus:outline-none" placeholder="LIC-1234" />
            </label>
            <label class="space-y-2 md:col-span-2">
              <span class="text-sm font-medium text-slate-700">Subscription Tier</span>
              <select id="schoolTier" class="w-full rounded-2xl border border-slate-300 px-4 py-3 focus:border-slate-900 focus:outline-none">

                <option>Premium</option>

            </div>
          </form>
        </div>
      `;
      document.getElementById('createSchoolForm').addEventListener('submit', (event) => {
        event.preventDefault();
        const name = document.getElementById('schoolName').value.trim();
        const location = document.getElementById('schoolLocation').value.trim();
        const board = document.getElementById('schoolBoard').value;
        const license = document.getElementById('schoolLicense').value.trim();
        const tier = document.getElementById('schoolTier').value;
        const id = `SCH${Math.floor(100 + Math.random() * 900)}`;
        state.schools.push({ id, name, location, board, license, status: 'Active', tier });
        addNotification(`[Super Admin created school] ${name} enrolled.`, ['Admin', 'Accountant']);
        renderCreateSchools();
        alert(`School ${name} successfully created with ID ${id}.`);
      });
    }

    function approveAdmission(admissionNumber) {
      const index = state.pendingAdmissions.findIndex(item => item.admissionNumber === admissionNumber);
      if (index < 0) return;
      const admission = state.pendingAdmissions.splice(index, 1)[0];
      const newStudent = {
        admissionNumber: admission.admissionNumber,
        name: admission.name,
        grade: admission.grade,
        section: admission.section,
        parent: { name: admission.parent, contact: 'Not Available' },
        attendance: { present: 0, absent: 0, late: 0 },
        marks: {},
        status: 'Active'
      };
      state.students.push(newStudent);
      addNotification('[Principal approved admission] New student onboarded.', ['Admin', 'Parent', 'Accountant']);
      renderApproveAdmissions();
    }

    function rejectAdmission(admissionNumber) {
      state.pendingAdmissions = state.pendingAdmissions.filter(item => item.admissionNumber !== admissionNumber);
      addNotification('[Principal rejected admission] Admission application declined.', ['Parent']);
      renderApproveAdmissions();
    }

            </label>
            <label class="space-y-2">
              <span class="text-sm font-medium text-slate-700">Payment Date</span>
              <input type="date" id="expenseDate" class="w-full rounded-2xl border border-slate-300 px-4 py-3 focus:border-slate-900" />
            </label>
            <div class="md:col-span-2 flex justify-end">
              <button type="submit" class="rounded-2xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white hover:bg-slate-800 transition">Save Expense</button>
            </div>
          </form>
        </div>
      `;
      document.getElementById('expenseForm').addEventListener('submit', (event) => {
        event.preventDefault();
        state.financials.expenses.push({ id: `EXP${Date.now()}`, category: document.getElementById('expenseCategory').value.trim(), description: document.getElementById('expenseDescription').value.trim(), amount: Number(document.getElementById('expenseAmount').value.trim()), date: document.getElementById('expenseDate').value });
        addNotification('[Accountant logged expense] New expense recorded.', ['Admin']);
        alert('Expense recorded successfully.');
        renderExpenseTracking();
      });
    }

    function renderFinancialReports() {
      clearWorkspace();
      const revenue = state.financials.fees.reduce((sum, fee) => sum + fee.amount, 0);
      const expense = state.financials.expenses.reduce((sum, expense) => sum + expense.amount, 0);
      const profit = revenue - expense;
      document.getElementById('workspace').innerHTML = `
        <div class="grid gap-6 md:grid-cols-3">
          <div class="rounded-3xl bg-white p-8 shadow-sm border border-slate-200">
            <div class="text-sm uppercase tracking-[0.2em] text-slate-500">Total Revenue</div>
            <div class="mt-4 text-4xl font-semibold text-slate-900">₹${revenue.toLocaleString()}</div>
          </div>
          <div class="rounded-3xl bg-white p-8 shadow-sm border border-slate-200">
            <div class="text-sm uppercase tracking-[0.2em] text-slate-500">Total Expenses</div>
            <div class="mt-4 text-4xl font-semibold text-slate-900">₹${expense.toLocaleString()}</div>
          </div>
          <div class="rounded-3xl bg-white p-8 shadow-sm border border-slate-200">
            <div class="text-sm uppercase tracking-[0.2em] text-slate-500">Net Balance</div>
            <div class="mt-4 text-4xl font-semibold ${profit >= 0 ? 'text-emerald-700' : 'text-rose-600'}">₹${profit.toLocaleString()}</div>
          </div>
        </div>
      `;
    }

    function renderTaxReports() {
      clearWorkspace();
      const totalExpenses = state.financials.expenses.reduce((sum, expense) => sum + expense.amount, 0);
      const taxLiability = Math.round(totalExpenses * 0.18);
      document.getElementById('workspace').innerHTML = `
        <div class="rounded-3xl bg-white p-8 shadow-sm border border-slate-200">
          <div class="text-2xl font-semibold text-slate-900 mb-3">Tax Reports</div>
          <div class="text-slate-500 mb-6">Export structured auditing sheets for accounting and tax compliance.</div>
          <div class="grid gap-6 md:grid-cols-2">
            <div class="rounded-3xl bg-slate-50 p-6">
              <div class="text-sm text-slate-500">Expense Total</div>
              <div class="mt-3 text-3xl font-semibold text-slate-900">₹${totalExpenses.toLocaleString()}</div>
            </div>
            <div class="rounded-3xl bg-slate-50 p-6">
              <div class="text-sm text-slate-500">Estimated Tax Liability</div>
              <div class="mt-3 text-3xl font-semibold text-slate-900">₹${taxLiability.toLocaleString()}</div>
            </div>
          </div>
          <div class="mt-6 rounded-3xl bg-white p-6 border border-slate-200">
            <button onclick="alert('Tax report exported successfully.')" class="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white hover:bg-slate-800 transition">Export Report</button>
          </div>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
